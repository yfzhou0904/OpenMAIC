  >Insta</text>

  <!-- "Class" text -->
  <text
    x="116"
    y="34"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="300"
    letter-spacing="-0.5"
    fill="#94A3B8"
  >Class</text>
